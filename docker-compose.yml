services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consensus-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "5000:8080"
    depends_on:
      mssql:
        condition: service_healthy
      mssql-init:
        condition: service_completed_successfully

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: consensus-mvc
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Strong123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - consensus_mssql_data:/var/opt/mssql
      - ./furnish_all_in_one.sql:/tmp/furnish_all_in_one.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Strong123!' -C -Q 'SELECT 1' || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: consensus-mvc-init
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./furnish_all_in_one.sql:/tmp/furnish_all_in_one.sql:ro
    command:
      [
        "/opt/mssql-tools18/bin/sqlcmd",
        "-S",
        "mssql",
        "-U",
        "sa",
        "-P",
        "Strong123!",
        "-C",
        "-b",
        "-i",
        "/tmp/furnish_all_in_one.sql"
      ]
    restart: "no"

volumes:
  consensus_mssql_data:
